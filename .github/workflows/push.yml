name: push-notify

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: install deps
        run: pip install firebase-admin

      - name: send notifications
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SA }}
        run: python push_notifier.py
